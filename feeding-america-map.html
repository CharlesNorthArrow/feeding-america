<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feeding America — Food Bank Finder</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* ── Top bar ── */
#topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; height: 52px; background: #003057; flex-shrink: 0;
  box-shadow: 0 2px 6px rgba(0,0,0,.25);
}
#topbar-left { display: flex; align-items: center; gap: 10px; }
#topbar-logo { height: 32px; filter: brightness(0) invert(1); }
#disclaimer-bar {
  background: #fff8e1; border-bottom: 1px solid #ffe082;
  padding: 6px 16px; font-size: 12px; color: #5d4037; line-height: 1.4;
  flex-shrink: 0;
}
#disclaimer-bar a { color: #003057; font-weight: 600; }
#topbar-title { color: #fff; font-size: 16px; font-weight: 600; letter-spacing: .2px; }
#lang-toggle {
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.3);
  color: #fff; padding: 4px 12px; border-radius: 16px; cursor: pointer;
  font-size: 13px; font-weight: 500; transition: background .15s;
}
#lang-toggle:hover { background: rgba(255,255,255,.22); }

/* ── Main layout ── */
#main { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ── */
#sidebar {
  width: 340px; flex-shrink: 0; display: flex; flex-direction: column;
  background: #fff; border-right: 1px solid #dde3ea; overflow: hidden;
  z-index: 1;
}

#search-wrap { padding: 12px; border-bottom: 1px solid #eaecef; display: flex; gap: 8px; }
#search-input {
  flex: 1; padding: 7px 10px; border: 1px solid #c8cfd8; border-radius: 6px;
  font-size: 13px; outline: none;
}
#search-input:focus { border-color: #E8703A; box-shadow: 0 0 0 2px rgba(232,112,58,.15); }
#state-filter {
  padding: 7px 8px; border: 1px solid #c8cfd8; border-radius: 6px;
  font-size: 13px; background: #fff; outline: none; cursor: pointer;
}
#state-filter:focus { border-color: #E8703A; }

/* bank count bar */
#bank-count-bar {
  padding: 10px 14px 9px; background: #fff; border-bottom: 2px solid #eaecef;
  display: flex; align-items: baseline; gap: 5px;
}
#bank-count-num { font-size: 22px; font-weight: 800; color: #E8703A; line-height: 1; }
#bank-count-label { font-size: 12px; color: #6b7888; }

/* bank list */
#bank-list { flex: 1; overflow-y: auto; }
.bank-item {
  padding: 11px 14px; border-bottom: 1px solid #f0f2f5; cursor: pointer;
  display: flex; align-items: flex-start; gap: 10px; transition: background .1s;
}
.bank-item:hover { background: #f8f9fb; }
.bank-item.active { background: #fff4ee; border-left: 3px solid #E8703A; }
.bank-icon {
  width: 14px; height: 14px; border-radius: 50%; background: #f5c518;
  border: 2.5px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,.2);
  flex-shrink: 0; margin-top: 4px;
}
.bank-item.active .bank-icon { background: #003057; border-color: #f5c518; }
.bank-info { min-width: 0; }
.bank-item-name { font-size: 13px; font-weight: 600; color: #1a2533; line-height: 1.3; }
.bank-item-loc { font-size: 12px; color: #6b7888; margin-top: 2px; }
.no-results { padding: 32px 16px; text-align: center; color: #999; font-size: 13px; }

/* ── Map ── */
#map { flex: 1; position: relative; overflow: hidden; }
#map-canvas { width: 100%; height: 100%; }

/* ── Right detail panel ── */
#detail-panel {
  position: absolute; top: 0; right: 0; bottom: 0; width: 300px;
  background: #fff; box-shadow: -3px 0 12px rgba(0,0,0,.15);
  display: flex; flex-direction: column; z-index: 4;
  transform: translateX(100%); transition: transform .25s ease;
}
#detail-panel.visible { transform: translateX(0); }
#dp-header {
  padding: 14px 14px 12px; background: #003057; color: #fff;
  display: flex; align-items: flex-start; gap: 8px; flex-shrink: 0;
}
#dp-header-text { flex: 1; min-width: 0; }
#dp-name { font-size: 14px; font-weight: 700; line-height: 1.4; }
#dp-location { font-size: 11px; margin-top: 3px; opacity: .8; line-height: 1.4; }
#dp-close {
  background: rgba(255,255,255,.15); border: none; color: #fff;
  width: 24px; height: 24px; border-radius: 4px; cursor: pointer;
  font-size: 14px; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px; transition: background .15s;
}
#dp-close:hover { background: rgba(255,255,255,.3); }
#dp-body { padding: 12px 14px; overflow-y: auto; flex: 1; }
.detail-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; font-size: 13px; }
.detail-label { color: #888; flex-shrink: 0; width: 68px; font-size: 11px; padding-top: 2px; text-transform: uppercase; letter-spacing: .4px; }
.detail-val { color: #1a2533; word-break: break-word; line-height: 1.4; }
.detail-val a { color: #E8703A; text-decoration: none; }
.detail-val a:hover { text-decoration: underline; }
.counties-list { font-size: 12px; color: #555; line-height: 1.6; }
#dp-actions { display: flex; gap: 8px; padding: 10px 14px; border-top: 1px solid #eee; flex-wrap: wrap; flex-shrink: 0; }
.detail-btn {
  flex: 1; min-width: 70px; padding: 7px 8px; border-radius: 6px; border: none;
  cursor: pointer; font-size: 12px; font-weight: 600; text-align: center;
  text-decoration: none; display: inline-block; transition: opacity .15s;
}
.detail-btn:hover { opacity: .85; }
.btn-primary { background: #E8703A; color: #fff; }
.btn-secondary { background: #f0f4f8; color: #003057; }
.btn-outline { background: transparent; border: 1px solid #E8703A; color: #E8703A; }

/* ── Nearby panel (top-left) ── */
#nearby-panel {
  position: absolute; top: 12px; left: 12px; z-index: 3;
  background: #fff; border: 1px solid #dde3ea; border-radius: 8px;
  box-shadow: 0 2px 10px rgba(0,0,0,.15); padding: 12px; width: 230px;
}
#nearby-title {
  font-size: 11px; font-weight: 700; color: #003057; text-transform: uppercase;
  letter-spacing: .5px; margin-bottom: 9px;
}
#nearby-addr-row { display: flex; gap: 5px; margin-bottom: 7px; }
#addr-input {
  flex: 1; padding: 6px 8px; border: 1px solid #c8cfd8; border-radius: 5px;
  font-size: 12px; outline: none;
}
#addr-input:focus { border-color: #E8703A; box-shadow: 0 0 0 2px rgba(232,112,58,.12); }
#addr-go-btn {
  padding: 6px 10px; background: #E8703A; color: #fff; border: none; border-radius: 5px;
  font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
}
#addr-go-btn:hover { background: #d4622f; }
#locate-user-btn {
  width: 100%; padding: 6px 0; background: #f0f4f8; color: #003057; border: 1px solid #c8cfd8;
  border-radius: 5px; font-size: 12px; font-weight: 600; cursor: pointer; margin-bottom: 9px;
  transition: background .1s;
}
#locate-user-btn:hover { background: #e2eaf2; }
#radius-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
#radius-label { font-size: 11px; color: #888; white-space: nowrap; }
.radius-btn {
  padding: 3px 8px; border: 1px solid #c8cfd8; border-radius: 12px; background: #fff;
  font-size: 11px; font-weight: 500; cursor: pointer; color: #1a2533; transition: all .1s;
}
.radius-btn:hover { border-color: #E8703A; color: #E8703A; }
.radius-btn.active { background: #003057; border-color: #003057; color: #fff; }
#nearby-count {
  margin-top: 8px; font-size: 11px; color: #666; display: none;
}
#nearby-count.visible { display: block; }
#clear-nearby {
  background: none; border: none; color: #E8703A; font-size: 11px; cursor: pointer;
  padding: 0; margin-left: 4px; text-decoration: underline;
}

/* ── Health layers panel (bottom-left, always visible) ── */
#layer-panel {
  position: absolute; bottom: 32px; left: 12px; z-index: 3;
  background: #fff; border: 1px solid #dde3ea; border-radius: 8px;
  box-shadow: 0 2px 10px rgba(0,0,0,.15); padding: 10px 10px 8px; width: 220px;
}
#layer-panel-title {
  font-size: 11px; font-weight: 700; color: #003057; text-transform: uppercase;
  letter-spacing: .5px; margin-bottom: 4px;
}
#layer-hint {
  font-size: 10px; color: #8a96a3; margin-bottom: 8px; padding-bottom: 6px;
  border-bottom: 1px solid #eaecef;
}
#layer-hint.hidden { display: none; }
@keyframes layer-nudge {
  0%   { background: transparent; }
  40%  { background: #e8f0fb; }
  100% { background: transparent; }
}
.layer-opt.nudge { animation: layer-nudge 1.2s ease 0.6s 2; }
.layer-opt {
  display: flex; align-items: center; gap: 9px; padding: 7px 8px; border-radius: 6px;
  cursor: pointer; font-size: 12px; color: #1a2533; transition: background .1s;
  margin-bottom: 3px; border: 1px solid transparent;
}
.layer-opt:hover { background: #f5f7fa; border-color: #dde3ea; }
.layer-opt.active { background: #f0f4f8; border-color: #003057; color: #003057; font-weight: 600; }
.layer-swatch {
  width: 30px; height: 10px; border-radius: 3px; flex-shrink: 0;
}
#layer-legend { margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee; display: none; }
#layer-legend.visible { display: block; }
#legend-title { font-size: 10px; color: #888; margin-bottom: 4px; }
#legend-bar { height: 8px; border-radius: 3px; margin-bottom: 3px; }
#legend-labels { display: flex; justify-content: space-between; font-size: 10px; color: #888; }

/* ── Loading overlay ── */
#loading-overlay {
  position: absolute; inset: 0; background: rgba(255,255,255,.85);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 10; gap: 12px;
}
#loading-overlay.hidden { display: none; }
#loading-msg { font-size: 14px; color: #444; }
.spinner {
  width: 32px; height: 32px; border: 3px solid #eee; border-top-color: #E8703A;
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* markers are now a GL circle layer — no DOM marker styles needed */

/* ── County hover tooltip ── */
#map-tooltip {
  position: fixed; display: none; pointer-events: none; z-index: 20;
  background: rgba(0,0,0,.72); color: #fff;
  padding: 5px 9px; border-radius: 4px;
  font-size: 12px; font-weight: 500; white-space: nowrap;
  box-shadow: 0 1px 4px rgba(0,0,0,.3);
}

/* scrollbar */
#bank-list::-webkit-scrollbar { width: 5px; }
#bank-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
#dp-body::-webkit-scrollbar { width: 4px; }
#dp-body::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

/* Mapbox popup */
.mapboxgl-popup-content { padding: 10px 14px; font-size: 13px; border-radius: 6px; max-width: 220px; }
.popup-name { font-weight: 700; color: #1a2533; margin-bottom: 4px; }
.popup-loc { color: #666; font-size: 12px; }

@media (max-width: 640px) {
  #sidebar { width: 100%; position: absolute; bottom: 0; left: 0; height: 45vh; z-index: 5; }
  #main { flex-direction: column-reverse; }
  #detail-panel { width: 100%; top: auto; height: 50vh; transform: translateY(100%); }
  #detail-panel.visible { transform: translateY(0); }
}
</style>
</head>
<body>

<div id="topbar">
  <div id="topbar-left">
    <img id="topbar-logo" src="https://upload.wikimedia.org/wikipedia/en/thumb/a/aa/Feeding_America_logo.svg/1280px-Feeding_America_logo.svg.png" alt="Feeding America logo">
    <span id="topbar-title">Food Bank Finder</span>
  </div>
  <button id="lang-toggle" onclick="toggleLang()">Español</button>
</div>
<div id="disclaimer-bar">
  ⚠️ This tool is not affiliated with or endorsed by Feeding America. It was built independently using public data available on <a href="https://www.feedingamerica.org" target="_blank" rel="noopener">feedingamerica.org</a>.
</div>

<div id="main">
  <div id="sidebar">
    <div id="search-wrap">
      <input id="search-input" type="text" placeholder="Search food banks…" oninput="setState({searchQuery: this.value, selectedBank: null})">
      <select id="state-filter" onchange="onStateFilter(this.value)">
        <option value="">All states</option>
      </select>
    </div>
    <div id="bank-count-bar"></div>
    <div id="bank-list"></div>
  </div>

  <div id="map">
    <div id="map-canvas"></div>

    <!-- Right-side detail panel -->
    <div id="detail-panel">
      <div id="dp-header">
        <div id="dp-header-text">
          <div id="dp-name"></div>
          <div id="dp-location"></div>
        </div>
        <button id="dp-close" onclick="deselectBank()">✕</button>
      </div>
      <div id="dp-body"></div>
      <div id="dp-actions"></div>
    </div>

    <!-- Near Me panel (top-left) -->
    <div id="nearby-panel">
      <div id="nearby-title">Near Me</div>
      <div id="nearby-addr-row">
        <input id="addr-input" type="text" placeholder="Enter address…"
               onkeydown="if(event.key==='Enter')searchAddress()">
        <button id="addr-go-btn" onclick="searchAddress()">Go</button>
      </div>
      <button id="locate-user-btn" onclick="locateUser()">📍 Use my location</button>
      <div id="radius-row">
        <span id="radius-label">Radius:</span>
        <button class="radius-btn" onclick="setRadius(5)">5 mi</button>
        <button class="radius-btn active" onclick="setRadius(10)">10 mi</button>
        <button class="radius-btn" onclick="setRadius(20)">20 mi</button>
        <button class="radius-btn" onclick="setRadius(30)">30 mi</button>
      </div>
      <div id="nearby-count">
        <span id="nearby-count-text"></span>
        <button id="clear-nearby" onclick="clearNearby()">Clear</button>
      </div>
    </div>

    <!-- Health layers panel (bottom-left, always open) -->
    <div id="layer-panel">
      <div id="layer-panel-title">Health Layers</div>
      <div id="layer-hint">Click a layer to overlay on map</div>
      <div class="layer-opt" id="opt-PHLTH" onclick="setLayer('PHLTH')">
        <div class="layer-swatch" style="background:linear-gradient(to right,#fdd49e,#7f0000)"></div>
        Poor / Fair Health
      </div>
      <div class="layer-opt" id="opt-OBESITY" onclick="setLayer('OBESITY')">
        <div class="layer-swatch" style="background:linear-gradient(to right,#fed976,#800026)"></div>
        Obesity Rate
      </div>
      <div class="layer-opt" id="opt-DIABETES" onclick="setLayer('DIABETES')">
        <div class="layer-swatch" style="background:linear-gradient(to right,#c6dbef,#084594)"></div>
        Diabetes Rate
      </div>
      <div class="layer-opt" id="opt-SNAP" onclick="setLayer('SNAP')">
        <div class="layer-swatch" style="background:linear-gradient(to right,#edf8e9,#005a32)"></div>
        SNAP Recipients
      </div>
      <div id="layer-legend">
        <div id="legend-title"></div>
        <div id="legend-bar"></div>
        <div id="legend-labels"><span id="legend-min"></span><span id="legend-max"></span></div>
      </div>
    </div>

    <div id="map-tooltip"></div>

    <div id="loading-overlay">
      <div class="spinner"></div>
      <div id="loading-msg">Loading map…</div>
    </div>
  </div>
</div>

    .filter(b => b.lng && b.lat && (!sf || b.state === sf))

      properties: { id: b.id, name: b.name, selected: b.id === state.selectedBank, nearby: nearbyBankIds.has(b.id) },

  'connecticut-foodshare': 'CT',
};

// ──────────────────────────────────────────────
// SERVICE AREA — TopoJSON + proximity disambiguation
// ──────────────────────────────────────────────
function normalizeCounty(n) {
  return n.toLowerCase()
    .replace(/\./g, '')            // st. clair → st clair
    .replace(/\bsaint\b/g, 'st')  // saint louis → st louis
    .replace(/\s+/g, ' ')
    .trim();
}

// Rough centroid from first polygon ring (no extra dep needed)
function featureCentroid(feature) {
  const geom = feature.geometry;
  if (!geom) return null;
  let ring;
  if (geom.type === 'Polygon')      ring = geom.coordinates[0];
  else if (geom.type === 'MultiPolygon') ring = geom.coordinates[0][0];
  else return null;
  if (!ring?.length) return null;
  let sx = 0, sy = 0;
  for (const [x, y] of ring) { sx += x; sy += y; }
  return [sx / ring.length, sy / ring.length];
}

async function loadServiceArea(bank) {
  // Need HQ coords for proximity disambiguation
  if (!bank.lng || !bank.lat) return;

  // Clear while loading
  map.getSource('service-area').setData({ type: 'FeatureCollection', features: [] });

  // Load TopoJSON once (shared with choropleth)
  if (!topoGeoJson) {
    try {
      const res = await fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json',
        { signal: AbortSignal.timeout(20000) });
      if (!res.ok) return;
      const topo = await res.json();
      topoGeoJson = topojson.feature(topo, topo.objects.counties);
    } catch { return; }
  }

  // Build name index once
  if (!topoGeoJson._nameIndex) {
    const idx = {};
    for (const f of topoGeoJson.features) {
      const key = normalizeCounty(f.properties?.name || '');
      if (key) (idx[key] = idx[key] || []).push(f);
    }
    topoGeoJson._nameIndex = idx;
  }

  applyServiceArea(bank, getBankCounties(bank));
}

// Synchronous county matching — requires topoGeoJson + _nameIndex to be loaded
function getBankCounties(bank) {
  if (!topoGeoJson?._nameIndex) return [];

  // Full-state override (e.g. Connecticut uses planning regions, not county names)
  if (FULL_STATE_COVERAGE[bank.slug]) {
    const stateFips = STATE_TO_FIPS[FULL_STATE_COVERAGE[bank.slug]];
    return topoGeoJson.features.filter(f => String(f.id).padStart(5, '0').startsWith(stateFips));
  }

  const idx = topoGeoJson._nameIndex;
  const matched = [];
  for (const rawName of bank.counties.split(',').map(c => normalizeCounty(c))) {
    if (!rawName) continue;
    const candidates =
      idx[rawName] ||
      idx[rawName.replace(/\s/g, '')] ||
      Object.entries(idx).find(([k]) => k.replace(/\s/g, '') === rawName.replace(/\s/g, ''))?.[1] ||
      [];
    if (!candidates.length) continue;
    if (candidates.length === 1) { matched.push(candidates[0]); continue; }
    let best = null, bestDist = Infinity;
    for (const f of candidates) {
      const c = featureCentroid(f);
      if (!c) continue;
      const dist = Math.hypot(c[0] - bank.lng, c[1] - bank.lat);
      if (dist < bestDist) { bestDist = dist; best = f; }
    }
    if (best) matched.push(best);
  }
  return matched;
}

function applyServiceArea(bank, matched) {
  // Individual county fills (for hover tooltip)
  map.getSource('service-area').setData({ type: 'FeatureCollection', features: matched });

  // Store FIPS for health stats
  currentServiceAreaFips = matched.map(f => String(f.id).padStart(5, '0'));
  currentServiceAreaStateFips = STATE_TO_FIPS[bank.state] || '';

  // Compute union of all counties → outer yellow boundary only
  let boundaryData = { type: 'FeatureCollection', features: [] };
  if (matched.length > 0) {
    try {
      const tagged = turf.featureCollection(
        matched.map(f => turf.feature(f.geometry, { g: 1 }))
      );
      const dissolved = turf.dissolve(tagged, { propertyName: 'g' });
      boundaryData = dissolved;
    } catch {}
  }
  map.getSource('service-area-boundary').setData(boundaryData);

  // Fit map to the full service area (include HQ marker)
  if (matched.length > 0) {
    const bounds = new mapboxgl.LngLatBounds();
    bounds.extend([bank.lng, bank.lat]);
    for (const f of matched) {
      const geom = f.geometry;
      const addRing = ring => ring.forEach(([lng, lat]) => bounds.extend([lng, lat]));
      if (geom.type === 'Polygon') geom.coordinates.forEach(addRing);
      else if (geom.type === 'MultiPolygon') geom.coordinates.forEach(poly => poly.forEach(addRing));
    }
    map.fitBounds(bounds, { padding: 60, maxZoom: 9, duration: 1200 });
  } else {
    map.flyTo({ center: [bank.lng, bank.lat], zoom: Math.max(map.getZoom(), 7), speed: 1.2 });
  }

  // Keep service-area + food bank dots on top of choropleth
  ['nearby-circle-fill','nearby-circle-line','service-area-fill','service-area-outline','service-area-boundary','food-banks-circle'].forEach(id => {
    if (map.getLayer(id)) map.moveLayer(id);
  });

  // Load all 3 CDC metrics in background for health stats panel
  loadAllCdcMetrics();
}

const LAYERS = {
  PHLTH:   { label: 'Poor / Fair Health (%)', low: '#fdd49e', high: '#7f0000' },
  OBESITY: { label: 'Obesity Rate (%)',        low: '#fed976', high: '#800026' },
  DIABETES:{ label: 'Diabetes Rate (%)',       low: '#c6dbef', high: '#084594' },
  SNAP:    { label: 'SNAP Recipients (%)',     low: '#edf8e9', high: '#005a32' },
};

// topo cached once; CDC data cached per measureId
let topoGeoJson = null;
let statesGeoJson = null;
const cdcCache = {};      // measureId → { rateMap, min, max }
let activeLayer = null;   // currently shown measureId | null

// Service area context for health stats
let currentServiceAreaFips = [];   // ['01001', '01003', ...]
let currentServiceAreaStateFips = ''; // '01' (2-digit)

// Shared layer data fetch — populates cdcCache[measureId]
async function loadCdcMetric(measureId) {
  if (cdcCache[measureId]) return;

  if (measureId === 'SNAP') {
    // Census ACS 5-year: % of households receiving SNAP (B22003)
    const url = 'https://api.census.gov/data/2022/acs/acs5?get=B22003_002E,B22003_001E&for=county:*';
    const res = await fetch(url, { signal: AbortSignal.timeout(30000) });
    if (!res.ok) throw new Error('Census fetch failed');
    const rows = await res.json();
    const rateMap = {};
    let min = Infinity, max = -Infinity;
    // rows[0] is header: ['B22003_002E','B22003_001E','state','county']
    for (let i = 1; i < rows.length; i++) {
      const [snapHH, totalHH, stFips, coFips] = rows[i];
      const total = +totalHH, snap = +snapHH;
      if (total > 0 && snap >= 0) {
        const v = (snap / total) * 100;
        const fips = String(stFips).padStart(2, '0') + String(coFips).padStart(3, '0');
        rateMap[fips] = v;
        if (v < min) min = v;
        if (v > max) max = v;
      }
    }
    const sortedVals = Object.values(rateMap).sort((a, b) => a - b);
    cdcCache['SNAP'] = { rateMap, min, max, sortedVals };
    return;
  }

  // CDC PLACES for health metrics
  const url = `https://data.cdc.gov/resource/swc5-untb.json?measureid=${measureId}&datavaluetypeid=CrdPrv&$limit=4000&$select=locationid,data_value`;
  const res = await fetch(url, { signal: AbortSignal.timeout(20000) });
  if (!res.ok) throw new Error('CDC fetch failed');
  const rows = await res.json();
  const rateMap = {};
  let min = Infinity, max = -Infinity;
  rows.forEach(d => {
    if (d.locationid && d.data_value != null) {
      const v = +d.data_value;
      const fipsKey = String(+d.locationid).padStart(5, '0');
      rateMap[fipsKey] = v;
      if (v < min) min = v;
      if (v > max) max = v;
    }
  });
  const sortedVals = Object.values(rateMap).sort((a, b) => a - b);
  cdcCache[measureId] = { rateMap, min, max, sortedVals };
}

// Silently load all 3 metrics in background; re-render detail as each arrives
async function loadAllCdcMetrics() {
  for (const id of Object.keys(LAYERS)) {
    if (!cdcCache[id]) {
      try {
        await loadCdcMetric(id);
        if (state.selectedBank) renderDetail();
      } catch {}
    }
  }
}

async function setLayer(measureId) {
  // Hide discovery hint and nudge animation on first use
  document.getElementById('layer-hint').classList.add('hidden');
  document.querySelectorAll('.layer-opt.nudge').forEach(el => el.classList.remove('nudge'));

  // Toggle off if already active
  if (activeLayer === measureId) {
    activeLayer = null;
    map.setLayoutProperty('counties-choropleth', 'visibility', 'none');
    map.setLayoutProperty('counties-choropleth-outline', 'visibility', 'none');
    document.querySelectorAll('.layer-opt').forEach(el => el.classList.remove('active'));
    document.getElementById('layer-legend').classList.remove('visible');
    if (state.selectedBank) renderDetail();
    return;
  }

  // Highlight selected option
  document.querySelectorAll('.layer-opt').forEach(el => el.classList.remove('active'));
  document.getElementById(`opt-${measureId}`)?.classList.add('active');

  try {
    // Load TopoJSON once
    if (!topoGeoJson) {
      const res = await fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json', { signal: AbortSignal.timeout(20000) });
      if (!res.ok) throw new Error('TopoJSON fetch failed');
      const topo = await res.json();
      topoGeoJson = topojson.feature(topo, topo.objects.counties);
    }

    // Load CDC data using shared helper
    await loadCdcMetric(measureId);

    const { rateMap, min, max, sortedVals } = cdcCache[measureId];
    const cfg = LAYERS[measureId];

    // Quantile normalization: rank each value among all counties for maximum color contrast
    const quantilePos = v => {
      let lo = 0, hi = sortedVals.length;
      while (lo < hi) { const mid = (lo + hi) >> 1; sortedVals[mid] < v ? lo = mid + 1 : hi = mid; }
      return sortedVals.length > 1 ? lo / (sortedVals.length - 1) : 0.5;
    };

    // Color each county feature
    const colored = {
      type: 'FeatureCollection',
      features: topoGeoJson.features.map(f => {
        const fips = String(f.id).padStart(5, '0');
        const rate = rateMap[fips];
        const fillColor = rate != null
          ? interpolateColor(cfg.low, cfg.high, quantilePos(rate))
          : '#e8eaed';
        return { ...f, properties: { ...f.properties, fillColor, rate } };
      }),
    };

    map.getSource('counties-base').setData(colored);
    map.setLayoutProperty('counties-choropleth', 'visibility', 'visible');
    map.setLayoutProperty('counties-choropleth-outline', 'visibility', 'visible');

    // Keep service-area + food bank dots on top
    if (map.getLayer('service-area-fill'))    map.moveLayer('service-area-fill');
    if (map.getLayer('service-area-outline')) map.moveLayer('service-area-outline');
    if (map.getLayer('food-banks-pulse'))     map.moveLayer('food-banks-pulse');
    if (map.getLayer('food-banks-circle'))    map.moveLayer('food-banks-circle');

    activeLayer = measureId;
    renderLegend(measureId, min, max);

    // Refresh detail panel health stats if a bank is selected
    if (state.selectedBank) renderDetail();

  } catch {
    document.getElementById(`opt-${measureId}`)?.classList.remove('active');
    alert('Layer failed to load. Please try again.');
  }
}

function renderLegend(measureId, min, max) {
  const cfg = LAYERS[measureId];
  document.getElementById('legend-title').textContent = cfg.label;
  document.getElementById('legend-bar').style.background = `linear-gradient(to right, ${cfg.low}, ${cfg.high})`;
  document.getElementById('legend-min').textContent = min.toFixed(1) + '%';
  document.getElementById('legend-max').textContent = max.toFixed(1) + '%';
  document.getElementById('layer-legend').classList.add('visible');
}

function interpolateColor(c1, c2, t) {
  const hex = h => parseInt(h, 16);
  const r1 = hex(c1.slice(1,3)), g1 = hex(c1.slice(3,5)), b1 = hex(c1.slice(5,7));
  const r2 = hex(c2.slice(1,3)), g2 = hex(c2.slice(3,5)), b2 = hex(c2.slice(5,7));
  const r = Math.round(r1 + (r2-r1)*t);
  const g = Math.round(g1 + (g2-g1)*t);
  const b = Math.round(b1 + (b2-b1)*t);
  return `#${[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('')}`;
}

// NEAR ME — address lookup + radius filter
// ──────────────────────────────────────────────
let nearbyCenter = null;   // [lng, lat]
let nearbyRadius = 10;     // miles
let nearbyBankIds = new Set(); // IDs of banks matching current nearby search
let pulseRafId = null;     // requestAnimationFrame handle for pulse animation

function startPulse() {
  if (pulseRafId) cancelAnimationFrame(pulseRafId);
  const start = performance.now();
  function frame(now) {
    const t = ((now - start) % 1800) / 1800; // 1.8s cycle
    // Ease out: expand from 9→22px, fade from 0.6→0
    const r = 9 + t * 13;
    const opacity = 0.6 * (1 - t);
    if (map.getLayer('food-banks-pulse')) {
      map.setPaintProperty('food-banks-pulse', 'circle-radius', r);
      map.setPaintProperty('food-banks-pulse', 'circle-opacity', opacity);
    }
    pulseRafId = requestAnimationFrame(frame);
  }
  pulseRafId = requestAnimationFrame(frame);
}

function stopPulse() {
  if (pulseRafId) { cancelAnimationFrame(pulseRafId); pulseRafId = null; }
  if (map.getLayer('food-banks-pulse')) {
    map.setPaintProperty('food-banks-pulse', 'circle-opacity', 0);
  }
}

function haversine(lng1, lat1, lng2, lat2) {
  const R = 3958.8, rad = Math.PI / 180;
  const dLat = (lat2 - lat1) * rad, dLng = (lng2 - lng1) * rad;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*rad)*Math.cos(lat2*rad)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

async function searchAddress() {
  const query = document.getElementById('addr-input').value.trim();
  if (!query) return;
  try {
    const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(query)}.json?country=us,pr&limit=1&access_token=${MAPBOX_TOKEN}`;
    const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
    if (!res.ok) throw new Error('Geocode failed');
    const data = await res.json();
    if (!data.features?.length) { alert('Address not found. Try a more specific address.'); return; }
    const [lng, lat] = data.features[0].center;
    showNearby(lng, lat);
  } catch { alert('Address lookup failed. Please try again.'); }
}

function locateUser() {
  if (!navigator.geolocation) return alert('Geolocation not available.');
  navigator.geolocation.getCurrentPosition(
    pos => showNearby(pos.coords.longitude, pos.coords.latitude),
    () => alert('Unable to get your location.')
  );
}

function showNearby(lng, lat) {
  nearbyCenter = [lng, lat];
  map.flyTo({ center: [lng, lat], zoom: zoomForMiles(nearbyRadius), speed: 1.4 });

  const circle = turf.circle([lng, lat], nearbyRadius, { units: 'miles', steps: 64 });
  map.getSource('nearby-circle').setData(circle);

  // Each result: { bank, hqDist, byServiceArea }
  const results = [];
  for (const b of FOOD_BANKS) {
    if (!b.lng || !b.lat) continue;
    const hqDist = haversine(lng, lat, b.lng, b.lat);
    if (hqDist <= nearbyRadius) {
      results.push({ bank: b, hqDist, byServiceArea: false });
      continue;
    }
    // Check if any service-area county polygon overlaps the circle
    if (topoGeoJson?._nameIndex) {
      const counties = getBankCounties(b);
      const overlaps = counties.some(f => {
        const c = featureCentroid(f);
        // Fast centroid pre-filter before running full intersection
        if (c && haversine(lng, lat, c[0], c[1]) > nearbyRadius + 60) return false;
        try { return turf.booleanIntersects(circle, f); } catch { return false; }
      });
      if (overlaps) results.push({ bank: b, hqDist, byServiceArea: true });
    }
  }

  nearbyBankIds = new Set(results.map(r => r.bank.id));
  updateBanksSource();
  startPulse();

  setState({ searchQuery: '', stateFilter: '' });

  results.sort((a, b) => a.hqDist - b.hqDist);

  const countEl = document.getElementById('nearby-count');
  document.getElementById('nearby-count-text').textContent =
    `${results.length} food bank${results.length !== 1 ? 's' : ''} within ${nearbyRadius} mi`;
  countEl.classList.add('visible');

  renderNearbyList(results);
}

function renderNearbyList(results) {
  const el = document.getElementById('bank-list');
  if (!results.length) {
    el.innerHTML = `<div class="no-results">No food banks within ${nearbyRadius} miles.</div>`;
    return;
  }
  el.innerHTML = results.map(({ bank: b, hqDist, byServiceArea }) => {
    const locStr = byServiceArea
      ? `<span style="color:#7a9db5;font-weight:600">Serves this area · </span>`
      : `<span style="color:#E8703A;font-weight:600">${hqDist.toFixed(1)} mi · </span>`;
    return `
      <div class="bank-item${b.id === state.selectedBank ? ' active' : ''}" onclick="selectBank(${b.id})">
        <div class="bank-icon"></div>
        <div class="bank-info">
          <div class="bank-item-name">${escHtml(b.name)}</div>
          <div class="bank-item-loc">${locStr}${escHtml(b.city)}, ${b.state}</div>
        </div>
      </div>`;
  }).join('');
}

function setRadius(miles) {
  nearbyRadius = miles;
  document.querySelectorAll('.radius-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.textContent) === miles);
  });
  if (nearbyCenter) showNearby(...nearbyCenter);
}

function clearNearby() {
  nearbyCenter = null;
  nearbyBankIds = new Set();
  stopPulse();
  updateBanksSource();
  map.getSource('nearby-circle').setData({ type: 'FeatureCollection', features: [] });
  document.getElementById('nearby-count').classList.remove('visible');
  document.getElementById('addr-input').value = '';
  render(); // restore normal list
}

function zoomForMiles(miles) {
  if (miles <= 5) return 11;
  if (miles <= 10) return 10;
  if (miles <= 20) return 9;
  return 8;
}

// ──────────────────────────────────────────────
// LANGUAGE TOGGLE
// ──────────────────────────────────────────────
function toggleLang() {
  const lang = state.lang === 'en' ? 'es' : 'en';
  setState({ lang });
  document.documentElement.lang = lang;
  document.getElementById('lang-toggle').textContent = lang === 'en' ? 'Español' : 'English';
  document.getElementById('search-input').placeholder = t('searchPlaceholder');
  document.getElementById('topbar-title').textContent = t('title');
  document.getElementById('locate-user-btn').textContent = `📍 ${t('nearMe')}`;
  document.querySelector('#state-filter option[value=""]').textContent = t('allStates');
}

// ──────────────────────────────────────────────
// FILTER + STATE ZOOM
// ──────────────────────────────────────────────
function onStateFilter(value) {
  setState({ stateFilter: value, selectedBank: null });
  if (value) {
    flyToState(value);
  } else {
    map.flyTo({ center: [-96, 39], zoom: 3.5, speed: 1.2 });
  }
}

function flyToState(abbr) {
  if (!statesGeoJson) return;
  const fips = STATE_TO_FIPS[abbr];
  if (!fips) return;
  const feature = statesGeoJson.features.find(f => String(f.id).padStart(2, '0') === fips);
  if (!feature) return;
  const bounds = new mapboxgl.LngLatBounds();
  const addRing = ring => ring.forEach(([lng, lat]) => bounds.extend([lng, lat]));
  const geom = feature.geometry;
  if (geom.type === 'Polygon') geom.coordinates.forEach(addRing);
  else if (geom.type === 'MultiPolygon') geom.coordinates.forEach(poly => poly.forEach(addRing));
  map.fitBounds(bounds, { padding: 40, maxZoom: 8, duration: 1000 });
}

function filteredBanks() {
  const q = state.searchQuery.toLowerCase().trim();
  const s = state.stateFilter;
  return FOOD_BANKS.filter(b => {
    if (s && b.state !== s) return false;
    if (!q) return true;
    return b.name.toLowerCase().includes(q) || b.city.toLowerCase().includes(q) || b.counties.toLowerCase().includes(q);
  });
}

// ──────────────────────────────────────────────
// RENDER
// ──────────────────────────────────────────────
function render() {
  renderList();
  renderDetail();
  updateBanksSource();
}

function renderList() {
  const banks = filteredBanks();
  const el = document.getElementById('bank-list');
  const total = FOOD_BANKS.length;
  const countBar = document.getElementById('bank-count-bar');
  const countLabel = banks.length === total
    ? 'food banks nationwide'
    : `of ${total} food banks`;
  countBar.innerHTML = `<span id="bank-count-num">${banks.length}</span><span id="bank-count-label">${countLabel}</span>`;

  if (!banks.length) {
    el.innerHTML = `<div class="no-results">${t('noResults')}</div>`;
    return;
  }

  el.innerHTML = banks.map(b => `
    <div class="bank-item${b.id === state.selectedBank ? ' active' : ''}" onclick="selectBank(${b.id})">
      <div class="bank-icon">🏛️</div>
      <div class="bank-info">
        <div class="bank-item-name">${escHtml(b.name)}</div>
        <div class="bank-item-loc">${escHtml(b.city)}, ${b.state}</div>
      </div>
    </div>
  `).join('');

  // Scroll selected item into view
  if (state.selectedBank) {
    const active = el.querySelector('.bank-item.active');
    if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

function renderDetail() {
  const panel = document.getElementById('detail-panel');
  if (!state.selectedBank) {
    panel.classList.remove('visible');
    return;
  }
  const b = FOOD_BANKS.find(x => x.id === state.selectedBank);
  if (!b) { panel.classList.remove('visible'); return; }

  panel.classList.add('visible');

  document.getElementById('dp-name').textContent = b.name;
  document.getElementById('dp-location').textContent = `${b.addr}, ${b.city}, ${b.state} ${b.zip}`;

  const countiesList = b.counties.split(',')
    .map(c => c.trim().replace(/\b\w/g, l => l.toUpperCase()))
    .join(' · ');

  const logoUrl = BANK_LOGOS[b.slug];
  const logoHtml = logoUrl
    ? `<div style="text-align:center;padding:14px 12px 10px;border-bottom:1px solid #eee;margin-bottom:4px;">
        <img src="${escHtml(logoUrl)}" alt="${escHtml(b.name)}" loading="lazy"
          style="max-height:56px;max-width:220px;width:auto;object-fit:contain;"
          onerror="this.parentElement.style.display='none'">
       </div>`
    : '';

  document.getElementById('dp-body').innerHTML = `
    ${logoHtml}
    <div class="detail-row">
      <span class="detail-label">${t('phone')}</span>
      <span class="detail-val"><a href="tel:${escHtml(b.phone)}">${escHtml(b.phone)}</a></span>
    </div>
    <div class="detail-row">
      <span class="detail-label">${t('website')}</span>
      <span class="detail-val"><a href="https://${escHtml(b.website)}" target="_blank" rel="noopener">${escHtml(b.website)}</a></span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Counties in Service Area</span>
      <span class="detail-val counties-list">${escHtml(countiesList)}</span>
    </div>
    ${renderHealthStats()}
  `;

  document.getElementById('dp-actions').innerHTML = `
    <a class="detail-btn btn-primary" href="${escHtml(b.findFood)}" target="_blank" rel="noopener">${t('findFood')}</a>
    <a class="detail-btn btn-secondary" href="${escHtml(b.volunteer)}" target="_blank" rel="noopener">${t('volunteer')}</a>
    <a class="detail-btn btn-outline" href="${escHtml(b.donate)}" target="_blank" rel="noopener">${t('donate')}</a>
  `;
}

function renderHealthStats() {
  if (!currentServiceAreaFips.length) return '';

  const anyLoaded = Object.keys(LAYERS).some(id => cdcCache[id]);
  if (!anyLoaded) {
    return `<div style="margin-top:14px;padding-top:12px;border-top:1px solid #eee;">
      <div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Health Indicators</div>
      <div style="font-size:12px;color:#aaa;">Loading health data…</div>
    </div>`;
  }

  const fmt = v => v != null ? v.toFixed(1) + '%' : null;
  const statePrefix = currentServiceAreaStateFips;

  function metricStats(measureId) {
    const cached = cdcCache[measureId];
    if (!cached) return null;
    const { rateMap } = cached;
    const saVals = currentServiceAreaFips.map(f => rateMap[f]).filter(v => v != null);
    if (!saVals.length) return null;
    const avg = arr => arr.reduce((a, b) => a + b, 0) / arr.length;
    const saAvg = avg(saVals);
    const stateVals = statePrefix
      ? Object.entries(rateMap).filter(([f]) => f.startsWith(statePrefix)).map(([, v]) => v)
      : [];
    const stateAvg = stateVals.length ? avg(stateVals) : null;
    const allVals = Object.values(rateMap);
    const natAvg = allVals.length ? avg(allVals) : null;
    return { saAvg, stateAvg, natAvg };
  }

  function metricCard(measureId) {
    const cfg = LAYERS[measureId];
    const stats = metricStats(measureId);

    if (!stats) {
      return `<div style="margin-bottom:14px;">
        <div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;">${cfg.label}</div>
        <div style="font-size:11px;color:#bbb;">Data unavailable</div>
      </div>`;
    }

    const { saAvg, stateAvg, natAvg } = stats;

    // Delta badge vs national
    const diff = natAvg != null ? saAvg - natAvg : null;
    let badge = '';
    if (diff != null) {
      if (Math.abs(diff) < 0.3) {
        badge = `<span style="background:#f0f0f0;color:#888;padding:2px 6px;border-radius:10px;font-size:10px;font-weight:600;">≈ US avg</span>`;
      } else if (diff > 0) {
        badge = `<span style="background:#fdecea;color:#c0392b;padding:2px 6px;border-radius:10px;font-size:10px;font-weight:600;">▲ ${diff.toFixed(1)}% above US</span>`;
      } else {
        badge = `<span style="background:#eafaf1;color:#27ae60;padding:2px 6px;border-radius:10px;font-size:10px;font-weight:600;">▼ ${Math.abs(diff).toFixed(1)}% below US</span>`;
      }
    }

    // Bar chart: normalize bars to max of the three values + 20% headroom
    const maxVal = Math.max(saAvg, stateAvg ?? 0, natAvg ?? 0) * 1.25 || 1;
    const barPct = v => v != null ? Math.round((v / maxVal) * 100) : 0;

    function bar(val, color, label) {
      const pct = barPct(val);
      const valStr = fmt(val) ?? '—';
      return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
        <div style="width:62px;font-size:10px;color:#888;flex-shrink:0;">${label}</div>
        <div style="flex:1;background:#f0f2f5;border-radius:3px;height:8px;overflow:hidden;">
          <div style="width:${pct}%;background:${color};height:100%;border-radius:3px;transition:width .4s;"></div>
        </div>
        <div style="width:34px;font-size:11px;font-weight:600;color:#1a2533;text-align:right;flex-shrink:0;">${valStr}</div>
      </div>`;
    }

    return `<div style="margin-bottom:16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
        <div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px;">${cfg.label}</div>
        ${badge}
      </div>
      ${bar(saAvg,    '#003057', 'Service area')}
      ${bar(stateAvg, '#7a9db5', 'State avg')}
      ${bar(natAvg,   '#c8d8e4', 'US avg')}
    </div>`;
  }

  const cards = Object.keys(LAYERS).map(metricCard).join('');
  return `<div style="margin-top:14px;padding-top:12px;border-top:1px solid #eee;">
    <div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;">Health Indicators</div>
    ${cards}
    <div style="font-size:10px;color:#bbb;margin-top:2px;">Source: CDC PLACES 2023</div>
  </div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ──────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────
document.getElementById('loading-msg').textContent = t('loadingMap');
render();
</script>
